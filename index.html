<!DOCTYPE html>
<html lang="de">

    <link rel="stylesheet" href="css/style.css">

    <footer>
        <div class="contact">
            <a href="https://instagram.com/apebuam" title="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="tel:+49123456789" title="Telefon"><i class="fas fa-phone"></i></a>
            <a href="https://wa.me/49123456789" title="WhatsApp"><i class="fab fa-whatsapp"></i></a>
